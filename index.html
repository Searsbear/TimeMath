<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chained Routine Planner</title>
    <style>
        :root {
            --bg: #020617;
            --card-bg: #0f172a;
            --border: #1e293b;
            --accent-green: #10b981;
            --accent-purple: #a855f7;
            --accent-blue: #38bdf8;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --danger: #ef4444;
            --input-bg: #1e293b;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            line-height: 1.5;
        }

        .container {
            width: 100%;
            max-width: 950px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .header-title {
            margin-top: 0;
            color: var(--accent-green);
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
            font-size: 1.5rem;
        }

        .scheduler-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-bottom: 25px;
        }

        h3 { 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            font-size: 1.1rem;
            margin-top: 0;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }

        /* Card Styles */
        .group-container, .backlog-item {
            background: #152033;
            border: 1px solid var(--border);
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        /* Flex Layouts for Rows */
        .row-flex {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 10px;
        }

        .sub-task {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            background: #1e293b;
            padding: 12px;
            margin: 8px 0;
            border-radius: 6px;
        }

        /* Inputs */
        input, select {
            background: var(--input-bg);
            border: 1px solid #475569;
            color: white;
            padding: 10px;
            border-radius: 4px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
            font-size: 16px; /* Prevents iOS auto-zoom */
        }

        input:focus, select:focus { border-color: var(--accent-green); }
        
        .flex-grow { flex-grow: 1; min-width: 120px; }
        .w-small { width: 75px; }

        /* Buttons */
        button { font-family: inherit; }

        .scheduler-btn {
            cursor: pointer;
            padding: 12px;
            border: 1px solid var(--accent-green);
            background: transparent;
            color: var(--accent-green);
            font-weight: bold;
            transition: all 0.2s ease;
            border-radius: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
            min-height: 44px; /* Better touch target */
        }

        .scheduler-btn:hover {
            background: var(--accent-green);
            color: var(--bg);
        }

        .btn-del { 
            color: var(--danger); 
            border: 1px solid transparent; 
            background: rgba(239, 68, 68, 0.1); 
            cursor: pointer; 
            font-size: 0.85em; 
            padding: 8px 12px;
            border-radius: 4px;
            font-weight: bold;
            min-height: 38px;
        }
        
        .btn-move { 
            background: #334155; 
            color: var(--text-muted); 
            border: none; 
            cursor: pointer; 
            border-radius: 4px; 
            padding: 8px 12px; 
            font-size: 0.9em;
            min-height: 38px;
        }

        /* Dynamic Link Style */
        .link-wrapper {
            background: #1e293b;
            padding: 10px;
            margin-bottom: 12px;
            border-radius: 4px;
            font-size: 0.9em;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            color: var(--text-muted);
        }

        /* Execution Area */
        .execution-bar {
            text-align: center; 
            margin: 30px 0 10px; 
            padding: 20px; 
            background: #152033; 
            border: 1px solid var(--border);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .output {
            margin-top: 20px;
            padding: 25px;
            background: #020617;
            border: 1px solid var(--accent-green);
            border-radius: 8px;
            overflow-x: auto;
        }

        .time-mark {
            color: var(--accent-green);
            font-family: monospace;
            font-weight: bold;
            font-size: 1.05em;
        }
        
        .phase-mark { color: var(--text-muted); font-size: 0.9em; font-style: italic; }
        .routine-slot { margin-left: 25px; color: var(--accent-purple); font-size: 0.95em; padding: 4px 0; display: flex; align-items: center; gap: 8px;}
        .routine-slot::before { content: '↳'; color: #64748b; }

        /* =========================================
           MOBILE RESPONSIVENESS
        ========================================= */
        @media (max-width: 768px) {
            body { padding: 10px; }
            
            .container { padding: 15px; }
            
            .scheduler-grid { grid-template-columns: 1fr; gap: 15px; }

            .sub-task, .backlog-item .row-flex {
                flex-direction: row;
                align-items: center;
            }

            /* Force the name input to take full width on small screens to push time inputs down */
            .s-name, .b-name {
                width: 100%;
                order: -1; /* Pushes it to the top of the flex container */
                margin-bottom: 5px;
            }

            .time-inputs {
                display: flex;
                flex-wrap: wrap;
                gap: 10px;
                flex-grow: 1;
            }
            
            .g-name {
                width: 100%;
                order: -1;
                margin-bottom: 5px;
            }

            .execution-bar { padding: 15px; }
            
            .header-title { font-size: 1.25rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h2 class="header-title">CHAINED ROUTINE PLANNER</h2>

        <div class="scheduler-grid">
            <div>
                <h3 style="color:var(--accent-green);">> Project Groups</h3>
                <div id="allGroups"></div>
                <button class="scheduler-btn" onclick="addGroup()" style="width:100%; margin-top:10px;">+ New Project</button>
            </div>

            <div>
                <h3 style="color:var(--accent-purple);">> Quick Task Backlog</h3>
                <div id="backlogContainer"></div>
                <button class="scheduler-btn" onclick="addBacklog()" style="border-color:var(--accent-purple); color:var(--accent-purple); margin-top:10px; width:100%;">+ Add Quick Task</button>
            </div>
        </div>

        <div class="execution-bar">
            <div style="display: flex; align-items: center; flex-wrap: wrap; justify-content: center; gap: 10px;">
                <strong style="color: var(--text-muted);">MASTER DEADLINE:</strong> 
                <input type="time" id="deadline" value="17:00" style="font-size: 1.1em; padding: 10px;">
            </div>
            <button class="scheduler-btn" onclick="calculate()" style="background:var(--accent-green); color:var(--bg); width:100%; max-width:300px; font-size: 1.1em;">RUN OPTIMIZATION</button>
        </div>

        <div id="output" class="output">
            <p style="text-align:center; color:var(--text-muted); margin: 0;">Click "Run Optimization" to generate your timeline.</p>
        </div>
    </div>

    <script>
        function updateLinks() {
            const groups = document.querySelectorAll('.group-container');
            groups.forEach((group, index) => {
                const linkWrapper = group.querySelector('.link-wrapper');
                if (linkWrapper) {
                    linkWrapper.style.display = index === 0 ? 'none' : 'flex';
                }
            });
        }

        function move(btn, selector, direction) {
            const row = btn.closest(selector);
            if (!row) return;

            if (direction === 'up' && row.previousElementSibling) {
                row.parentNode.insertBefore(row, row.previousElementSibling);
            } else if (direction === 'down' && row.nextElementSibling) {
                row.parentNode.insertBefore(row.nextElementSibling, row);
            }
            updateLinks();
        }

        function removeElement(btn, selector) {
            btn.closest(selector).remove();
            updateLinks();
        }

        function addGroup() {
            const id = Date.now();
            const div = document.createElement('div');
            div.className = 'group-container';
            div.innerHTML = `
                <div class="link-wrapper">
                    <span>Timing:</span> 
                    <select class="g-link flex-grow">
                        <option value="parallel">Parallel (Independent)</option>
                        <option value="sequential">Start After Previous Ends</option>
                    </select>
                </div>
                <div class="row-flex">
                    <input type="text" class="g-name flex-grow" placeholder="Project Name" style="font-weight:bold;">
                    <button class="btn-move" onclick="move(this, '.group-container', 'up')">↑</button>
                    <button class="btn-move" onclick="move(this, '.group-container', 'down')">↓</button>
                    <button class="btn-del" onclick="removeElement(this, '.group-container')" style="margin-left: auto;">Delete</button>
                </div>
                <div id="steps-${id}"></div>
                <button class="scheduler-btn" onclick="addSubTask('${id}')" style="border-color:var(--accent-blue); color:var(--accent-blue); font-size:0.8em; padding:8px; margin-top:10px;">+ Add Step</button>
            `;
            document.getElementById('allGroups').appendChild(div);
            updateLinks();
        }

        function addSubTask(groupId) {
            const container = document.getElementById(`steps-${groupId}`);
            const div = document.createElement('div');
            div.className = 'sub-task';
            div.innerHTML = `
                <input type="text" class="s-name flex-grow" placeholder="Step Name"> 
                <button class="btn-move" onclick="move(this, '.sub-task', 'up')">↑</button>
                <button class="btn-move" onclick="move(this, '.sub-task', 'down')">↓</button>
                <div class="time-inputs">
                    <div style="display:flex; align-items:center; gap:5px;">
                        <input type="number" class="s-active w-small" value="10" title="Active Minutes"> <span style="font-size:0.8em; color:#94a3b8;">m active</span>
                    </div>
                    <div style="display:flex; align-items:center; gap:5px;">
                        <input type="number" class="s-proc w-small" value="30" title="Processing/Wait Minutes"> <span style="font-size:0.8em; color:#94a3b8;">m wait</span>
                    </div>
                </div>
                <button class="btn-del" onclick="removeElement(this, '.sub-task')" style="margin-left: auto;">X</button>`;
            container.appendChild(div);
        }

        function addBacklog() {
            const div = document.createElement('div');
            div.className = 'backlog-item';
            div.innerHTML = `
                <div class="row-flex" style="margin:0;">
                    <input type="text" class="b-name flex-grow" placeholder="Quick Task"> 
                    <button class="btn-move" onclick="move(this, '.backlog-item', 'up')">↑</button>
                    <button class="btn-move" onclick="move(this, '.backlog-item', 'down')">↓</button>
                    <div style="display:flex; align-items:center; gap: 10px;">
                        <input type="number" class="b-time w-small" value="5" title="Minutes"> 
                        <label style="font-size:0.9em; color:var(--text-muted); display:flex; align-items:center; gap:4px; cursor:pointer;">
                            <input type="checkbox" class="b-chain"> Chain?
                        </label>
                    </div>
                    <button class="btn-del" onclick="removeElement(this, '.backlog-item')" style="margin-left: auto;">X</button>
                </div>
            `;
            document.getElementById('backlogContainer').appendChild(div);
        }

        function calculate() {
            const masterDeadlineStr = document.getElementById('deadline').value;
            if (!masterDeadlineStr) return alert("Please set a valid deadline.");
            
            const [h, m] = masterDeadlineStr.split(':');
            const baseDeadline = new Date();
            baseDeadline.setHours(h, m, 0, 0);

            let backlogElements = Array.from(document.querySelectorAll('.backlog-item'));
            let routines = [];
            let currentRoutine = [];

            backlogElements.forEach((el, index) => {
                let task = {
                    name: el.querySelector('.b-name').value || "Unnamed Task",
                    time: parseInt(el.querySelector('.b-time').value) || 0
                };
                currentRoutine.push(task);

                if (!el.querySelector('.b-chain').checked || index === backlogElements.length - 1) {
                    routines.push({ 
                        tasks: currentRoutine, 
                        totalTime: currentRoutine.reduce((sum, t) => sum + t.time, 0), 
                        used: false 
                    });
                    currentRoutine = [];
                }
            });

            let groupElements = Array.from(document.querySelectorAll('.group-container'));
            let groupData = groupElements.map((el, index) => ({
                name: el.querySelector('.g-name').value || `Project ${index + 1}`,
                link: el.querySelector('.g-link') ? el.querySelector('.g-link').value : 'parallel',
                steps: Array.from(el.querySelectorAll('.sub-task')).map((s, sIndex) => ({
                    name: s.querySelector('.s-name').value || `Step ${sIndex + 1}`,
                    active: parseInt(s.querySelector('.s-active').value) || 0,
                    proc: parseInt(s.querySelector('.s-proc').value) || 0
                })).reverse()
            }));

            let computedGroups = [];
            let nextNeededStart = new Date(baseDeadline);

            for (let i = groupData.length - 1; i >= 0; i--) {
                let group = groupData[i];
                let deadlineForThisGroup = (i < groupData.length - 1 && groupData[i+1].link === 'sequential') 
                    ? new Date(nextNeededStart) 
                    : new Date(baseDeadline);

                let tempTime = new Date(deadlineForThisGroup);
                let timeline = [];
                
                group.steps.forEach(step => {
                    let finish = new Date(tempTime);
                    tempTime.setMinutes(tempTime.getMinutes() - (step.active + step.proc));
                    let start = new Date(tempTime);
                    let activeFinish = new Date(start.getTime() + (step.active * 60000));

                    timeline.push({ 
                        ...step, 
                        start: start, 
                        activeFinish: activeFinish,
                        finish: finish 
                    });
                });
                
                nextNeededStart = new Date(tempTime);
                computedGroups.unshift({ name: group.name, timeline: timeline.reverse() });
            }

            let html = `<h2 style="color:var(--accent-green); text-align:center; margin-top:0; font-size:1.3rem;">MASTER TIMELINE</h2>`;
            
            if (computedGroups.length === 0) {
                html += `<p style="text-align:center;">No projects scheduled.</p>`;
            }

            computedGroups.forEach(group => {
                html += `<h3 style="border-bottom: 2px solid var(--accent-blue); color:var(--accent-blue); margin-top:30px;">[ ${group.name} ]</h3>`;
                
                if(group.timeline.length === 0) {
                     html += `<div style="color:var(--text-muted); margin-left:15px;">No steps defined.</div>`;
                }

                group.timeline.forEach(item => {
                    const startFmt = item.start.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                    const activeFmt = item.activeFinish.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                    const finishFmt = item.finish.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

                    html += `<div style="margin-bottom:20px; border-left:3px solid #334155; padding-left:15px;">
                        <div style="margin-bottom: 8px;">
                            <span class="time-mark">${startFmt}</span>: 
                            <strong style="color:white; font-size:1.05em;">${item.name}</strong> 
                            <span style="color:var(--text-muted); font-size:0.9em; display:inline-block;">(${item.active}m active)</span>
                        </div>`;

                    if (item.proc > 0) {
                        html += `<div style="margin-bottom: 5px;">
                            <span class="time-mark" style="color:var(--text-muted);">${activeFmt}</span>: 
                            <span class="phase-mark">Processing Phase Begins (${item.proc}m gap)</span>
                        </div>`;

                        let gapRemaining = item.proc;
                        routines.forEach(routine => {
                            if (!routine.used && routine.totalTime <= gapRemaining && routine.totalTime > 0) {
                                routine.tasks.forEach(t => {
                                    html += `<div class="routine-slot">
                                        <strong>${t.name}</strong> <span>(${t.time}m)</span>
                                    </div>`;
                                });
                                gapRemaining -= routine.totalTime;
                                routine.used = true;
                            }
                        });
                    }
                    html += `<div style="margin-top: 8px;">
                        <span class="time-mark" style="color:#64748b;">${finishFmt}</span>: 
                        <span class="phase-mark">Step Concludes</span>
                    </div>
                    </div>`;
                });
            });

            const unusedRoutines = routines.filter(r => !r.used && r.totalTime > 0);
            if (unusedRoutines.length > 0) {
                html += `<div style="margin-top: 30px; padding: 15px; border: 1px dashed var(--danger); border-radius: 6px; background: rgba(239, 68, 68, 0.05);">
                    <h4 style="color: var(--danger); margin-top: 0; margin-bottom: 10px;">Unscheduled Routines</h4>
                    <p style="font-size: 0.9em; margin-top: 0; margin-bottom: 8px;">The following backlog tasks couldn't fit into your processing gaps:</p>
                    <ul style="margin-bottom: 0; font-size: 0.9em; color: var(--text-muted); padding-left: 20px;">`;
                unusedRoutines.forEach(r => {
                    html += `<li style="margin-bottom: 4px;">${r.tasks.map(t => t.name).join(' → ')} (${r.totalTime}m total)</li>`;
                });
                html += `</ul></div>`;
            }

            document.getElementById('output').innerHTML = html;
        }

        // Initialize with default state
        addGroup();
        addSubTask(document.querySelector('.group-container').id || Date.now());
        addBacklog();
    </script>
</body>
</html>
